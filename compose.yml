services:
  app:
    container_name: pet_app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    environment:
      APP_ENV: dev
      APP_DEBUG: '1'
      GIT_USERNAME: Boris Medvedev
      GIT_EMAIL: borian.medvedev@gmail.com
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  db:
    container_name: pet_db
    image: postgres:latest
    environment:
      POSTGRES_DB: pet_db
      POSTGRES_USER: pet_user
      POSTGRES_PASSWORD: pet_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql:rw

volumes:
  db_data: